<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anna Craig</title>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@100;200;300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Work Sans', sans-serif;
      letter-spacing: 3px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ── HOMEPAGE ── */
    .background-container {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100vh;
      z-index: 0; background: #2a2a2a;
    }
    .background-container video {
      width: 100%; height: 100%;
      object-fit: cover; transform: scale(1.1);
    }
    .content-overlay {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .text-container { text-align: center; padding: 60px 80px; }
    .text-container h1 {
      font-size: 2.5rem; font-weight: 350;
      margin-bottom: 10px; color: #fff; letter-spacing: 8px;
    }
    .subtitle {
      font-size: 1rem; font-weight: lighter;
      margin-bottom: 30px; color: #fff;
    }
    .nav-links { display: flex; gap: 30px; justify-content: center; }
    .nav-links button {
      background: none; border: none; color: #fff; cursor: pointer;
      font-size: 0.9rem; font-family: 'Work Sans', sans-serif;
      letter-spacing: 3px; transition: opacity 0.3s;
    }
    .nav-links button:hover { opacity: 0.6; }

    /* ── SMALL MODALS ── */
    .modal {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center; align-items: center; z-index: 2000;
    }
    .modal-content {
      background: rgba(240,248,255,0.92);
      padding: 15px 25px; max-width: 300px; width: 90%;
      position: relative; text-align: center;
    }
    .modal-content p {
      margin-bottom: 5px; font-weight: lighter;
      font-size: 0.75rem; color: #1a1a1a;
    }
    .modal-content a { color: #1a1a1a; text-decoration: none; }
    .modal-content a:hover { opacity: 0.8; }
    .close {
      position: absolute; top: 10px; right: 18px;
      font-size: 22px; color: #871103; cursor: pointer;
    }
    .location-info { margin-top: 20px; }

    /* ── WORK MODAL ── */
    #modal-work {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: #ffffff;
      z-index: 1000; overflow-y: auto;
    }

    #close-work {
      position: fixed; top: 22px; right: 28px;
      background: none; border: none;
      color: rgba(0,0,0,0.22);
      font-size: 0.6rem; font-family: 'Work Sans', sans-serif;
      letter-spacing: 3px; cursor: pointer;
      z-index: 1010; transition: color 0.3s; text-transform: lowercase;
    }
    #close-work:hover { color: rgba(0,0,0,0.55); }

    #moodboard-canvas { position: relative; width: 100%; }

    .mood-item {
      position: absolute;
      overflow: hidden;
      background: #f0f0f0;
      transition:
        opacity 0.5s ease,
        left   0.7s cubic-bezier(0.25,0.46,0.45,0.94),
        top    0.7s cubic-bezier(0.25,0.46,0.45,0.94),
        width  0.7s cubic-bezier(0.25,0.46,0.45,0.94),
        height 0.7s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .mood-item img, .mood-item video {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .mood-item.faded { opacity: 0.05; }
    .mood-item.highlighted { opacity: 1; z-index: 50 !important; }

    /* Project list — bottom left */
    #project-list {
      position: fixed; bottom: 28px; left: 28px;
      z-index: 1005;
    }
    .proj-item { margin-bottom: 5px; }
    .proj-name {
      display: block;
      color: rgba(0,0,0,0.32);
      font-size: 0.6rem; font-weight: 300;
      letter-spacing: 2.5px;
      font-family: 'Work Sans', sans-serif;
      cursor: pointer; transition: color 0.3s;
    }
    .proj-name:hover, .proj-name.active { color: rgba(0,0,0,0.82); }

    /* Credit — bottom centre */
    #work-credit {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: rgba(0,0,0,0.32);
      font-size: 0.52rem; letter-spacing: 3px; font-weight: 200;
      font-family: 'Work Sans', sans-serif;
      opacity: 0; transition: opacity 0.4s;
      pointer-events: none; white-space: nowrap;
      z-index: 1005;
    }
    #work-credit.visible { opacity: 1; }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .text-container { padding: 40px 30px; width: 90%; }
      .text-container h1 { font-size: 2rem; }
      .subtitle { font-size: 0.9rem; }
      .nav-links { flex-direction: column; gap: 15px; }
      .modal-content { padding: 25px; width: 95%; }
      .modal-content p { margin-bottom: 12px; }

      #modal-work { overflow-y: auto; }

      #moodboard-canvas {
        position: relative !important;
        height: auto !important;
        display: grid !important;
        grid-template-columns: 1fr 1fr;
        gap: 3px;
        padding: 52px 3px 150px;
      }
      .mood-item {
        position: relative !important;
        left: auto !important; top: auto !important;
        width: 100% !important; height: auto !important;
        transform: none !important;
        transition: opacity 0.4s ease !important;
      }
      .mood-item img, .mood-item video {
        width: 100%; height: auto; object-fit: unset;
      }
      .mood-item.highlighted-mobile { order: -1; opacity: 1; }
      .mood-item.faded-mobile        { order: 99; opacity: 0.07; }

      #project-list {
        bottom: 10px; left: 10px; right: 10px;
        display: flex; flex-wrap: wrap; gap: 3px 10px; align-items: center;
      }
      .proj-item { margin-bottom: 0; }
      .proj-name { display: inline; font-size: 0.46rem; }

      #work-credit {
        bottom: 10px; left: auto; right: 10px;
        transform: none; text-align: right;
        font-size: 0.42rem; white-space: normal; max-width: 48vw;
      }
      #close-work { top: 14px; right: 14px; }
    }
  </style>
</head>
<body>

  <div class="background-container">
    <video autoplay muted loop playsinline preload="auto">
      <source src="video1.mov" type="video/mp4">
      <source src="video1.MOV" type="video/mp4">
    </video>
  </div>

  <div class="content-overlay">
    <div class="text-container">
      <h1>AnnaCraig</h1>
      <div class="subtitle">Art Director</div>
      <div class="nav-links">
        <button id="open-about">about</button>
        <button id="open-work">work</button>
        <button id="open-contact">contact</button>
      </div>
    </div>
  </div>

  <div id="modal-about" class="modal">
    <div class="modal-content">
      <span class="close" data-close="modal-about">&times;</span>
      <p>Visual artist and art director working across photography, set styling and installation</p>
      <div class="location-info">
        <p>b. 1995</p>
        <p>Based in St Leonards-on-Sea / London</p>
      </div>
    </div>
  </div>

  <div id="modal-contact" class="modal">
    <div class="modal-content">
      <span class="close" data-close="modal-contact">&times;</span>
      <p><a href="mailto:acshapes@gmail.com">acshapes@gmail.com</a></p>
      <p><a href="https://www.instagram.com/acshapes/" target="_blank">@acshapes</a></p>
    </div>
  </div>

  <div id="modal-work">
    <button id="close-work">close</button>
    <div id="moodboard-canvas"></div>
    <div id="project-list"></div>
    <div id="work-credit"></div>
  </div>

  <script>
    document.getElementById('open-about').onclick  = () => { document.getElementById('modal-about').style.display  = 'flex'; };
    document.getElementById('open-contact').onclick = () => { document.getElementById('modal-contact').style.display = 'flex'; };
    document.querySelectorAll('.close').forEach(btn => {
      btn.onclick = () => { document.getElementById(btn.dataset.close).style.display = 'none'; };
    });
    window.onclick = e => { if (e.target.classList.contains('modal')) e.target.style.display = 'none'; };

    const projects = [
      { id: 'notinservice', name: 'Not In Service',             client: 'Six Dots Design',         credit: 'Solo Creative Direction & Production'  },
      { id: 'folly',        name: 'A Folly Through The Trees',  client: 'Six Dots Design',         credit: 'Fabric Installation & Spatial Design'  },
      { id: 'balancing',    name: 'Balancing Art',              client: 'Six Dots Design',         credit: 'Photography & Creative Direction'       },
      { id: 'lifestyle',    name: 'Lifestyle',                  client: 'Six Dots Design',         credit: 'Photography & Creative Direction'       },
      { id: 'carousel',     name: 'Retail Window Installation', client: 'Carousel Jewels',         credit: 'Concept, Design & Installation'         },
      { id: 'film',         name: 'In His Name',                client: 'Lemon Top Pictures',      credit: 'Costume Design & Styling'              },
      { id: 'sol',          name: 'Sol Paradise',               client: 'Just Jump In Production', credit: 'Styling & Production Assistant'         },
      { id: 'starta',       name: 'The Aztek Shirt',            client: 'st arta',                 credit: 'Styling & Location Research'            },
      { id: 'product',      name: 'Product Shots',              client: 'Six Dots Design',         credit: 'Photography & Creative Direction'       },
    ];

    const items = [
      { file: 'notinservice1.jpeg', project: 'notinservice', aspect: 0.75  },
      { file: 'notinservice.mp4',   project: 'notinservice', aspect: 1.78, video: true },
      { file: 'folly1.jpeg',        project: 'folly',        aspect: 0.67  },
      { file: 'folly2.jpeg',        project: 'folly',        aspect: 0.67  },
      { file: 'folly3.jpeg',        project: 'folly',        aspect: 0.67  },
      { file: 'folly4.jpeg',        project: 'folly',        aspect: 0.67  },
      { file: 'balancing1.jpeg',    project: 'balancing',    aspect: 1.0   },
      { file: 'balancing2.jpeg',    project: 'balancing',    aspect: 0.67  },
      { file: 'balancing3.jpeg',    project: 'balancing',    aspect: 0.67  },
      { file: 'balancing4.jpeg',    project: 'balancing',    aspect: 1.5   },
      { file: 'lifestyle1.jpeg',    project: 'lifestyle',    aspect: 0.75  },
      { file: 'lifestyle2.jpeg',    project: 'lifestyle',    aspect: 1.5   },
      { file: 'lifestyle3.jpeg',    project: 'lifestyle',    aspect: 0.75  },
      { file: 'lifestyle4.jpeg',    project: 'lifestyle',    aspect: 0.75  },
      { file: 'carousel1.jpeg',     project: 'carousel',     aspect: 0.67  },
      { file: 'carousel2.jpeg',     project: 'carousel',     aspect: 0.67  },
      { file: 'carousel3.jpeg',     project: 'carousel',     aspect: 1.33  },
      { file: 'inhisname1.jpeg',    project: 'film',         aspect: 0.75  },
      { file: 'inhisname2.jpeg',    project: 'film',         aspect: 1.33  },
      { file: 'inhisname3.jpeg',    project: 'film',         aspect: 0.75  },
      { file: 'inhisname4.jpeg',    project: 'film',         aspect: 1.33  },
      { file: 'sol1.jpeg',          project: 'sol',          aspect: 0.67  },
      { file: 'sol2.jpeg',          project: 'sol',          aspect: 1.5   },
      { file: 'sol3.jpeg',          project: 'sol',          aspect: 1.33  },
      { file: 'starta1.jpeg',       project: 'starta',       aspect: 1.78  },
      { file: 'product1.jpeg',      project: 'product',      aspect: 0.75  },
    ];

    const canvas     = document.getElementById('moodboard-canvas');
    const projListEl = document.getElementById('project-list');
    const creditEl   = document.getElementById('work-credit');

    const domItems = items.map((item, i) => {
      const el = document.createElement('div');
      el.className = 'mood-item';
      el.dataset.project = item.project;
      el.dataset.index   = i;
      el.dataset.aspect  = item.aspect;

      if (item.video) {
        const v = document.createElement('video');
        v.autoplay = true; v.muted = true; v.loop = true; v.playsInline = true;
        const s = document.createElement('source');
        s.src = item.file; s.type = 'video/mp4';
        v.appendChild(s); el.appendChild(v);
      } else {
        const img = document.createElement('img');
        img.src = item.file; img.alt = ''; img.loading = 'lazy';
        el.appendChild(img);
      }

      canvas.appendChild(el);
      return el;
    });

    projects.forEach(proj => {
      const d = document.createElement('div');
      d.className = 'proj-item';
      const s = document.createElement('span');
      s.className = 'proj-name';
      s.dataset.project = proj.id;
      s.textContent = proj.name;
      d.appendChild(s);
      projListEl.appendChild(d);
    });

    const origPos = [];

    function isMobile() { return window.innerWidth <= 768; }

    function interleaveByProject(arr) {
      const byProject = {};
      arr.forEach((item, i) => {
        if (!byProject[item.project]) byProject[item.project] = [];
        byProject[item.project].push({ item, origIndex: i });
      });
      const queues = Object.values(byProject);
      const result = [];
      let safety = 0;
      while (result.length < arr.length && safety++ < 10000) {
        queues.forEach(q => { if (q.length) result.push(q.shift()); });
      }
      return result;
    }

    function layoutDesktop() {
      if (isMobile()) return;
      const W       = canvas.clientWidth;
      const numCols = 5;
      const gap     = 12;
      const padTop  = 55;
      const padSide = 22;
      const colW    = (W - padSide * 2 - gap * (numCols - 1)) / numCols;
      const colH    = new Array(numCols).fill(padTop);
      const order   = interleaveByProject(items);

      order.forEach(({ origIndex }) => {
        const item = items[origIndex];
        const el   = domItems[origIndex];
        const imgW = colW;
        const imgH = imgW / item.aspect;

        let minC = 0;
        for (let c = 1; c < numCols; c++) {
          if (colH[c] < colH[minC]) minC = c;
        }

        const x = padSide + minC * (colW + gap);
        const y = colH[minC];

        el.style.left      = x + 'px';
        el.style.top       = y + 'px';
        el.style.width     = imgW + 'px';
        el.style.height    = imgH + 'px';
        el.style.transform = 'none';
        el.style.zIndex    = origIndex + 1;

        origPos[origIndex] = { x, y, w: imgW, h: imgH };
        colH[minC] += imgH + gap;
      });

      canvas.style.height = Math.max(...colH) + 60 + 'px';
    }

    function clusterLayout(projEls) {
      const n    = projEls.length;
      const vw   = window.innerWidth;
      const vh   = window.innerHeight;
      const imgW = Math.min(vw * 0.17, 210);
      const gap  = 14;
      const cols = n <= 2 ? n : n <= 4 ? 2 : 3;

      return projEls.map((el, i) => {
        const col    = i % cols;
        const row    = Math.floor(i / cols);
        const aspect = parseFloat(el.dataset.aspect) || 1;
        const imgH   = imgW / aspect;
        const totalW = cols * imgW + (cols - 1) * gap;
        const startX = (vw - totalW) / 2;
        const startY = vh * 0.12;
        return { x: startX + col * (imgW + gap), y: startY + row * (imgH + gap), w: imgW, h: imgH };
      });
    }

    function resetMoodboard() {
      domItems.forEach((el, i) => {
        el.classList.remove('faded', 'highlighted');
        if (!isMobile() && origPos[i]) {
          const p = origPos[i];
          el.style.left   = p.x + 'px';
          el.style.top    = p.y + 'px';
          el.style.width  = p.w + 'px';
          el.style.height = p.h + 'px';
          el.style.zIndex = i + 1;
        }
      });
      creditEl.classList.remove('visible');
      creditEl.textContent = '';
    }

    document.querySelectorAll('.proj-name').forEach(nameEl => {
      const pid  = nameEl.dataset.project;
      const proj = projects.find(p => p.id === pid);

      nameEl.addEventListener('mouseenter', () => {
        if (isMobile()) return;
        const projEls = domItems.filter(el => el.dataset.project === pid);

        domItems.forEach(el => {
          if (el.dataset.project === pid) { el.classList.add('highlighted'); el.classList.remove('faded'); }
          else                            { el.classList.add('faded');       el.classList.remove('highlighted'); }
        });

        const layout = clusterLayout(projEls);
        projEls.forEach((el, i) => {
          const L = layout[i];
          el.style.left   = L.x + 'px';
          el.style.top    = L.y + 'px';
          el.style.width  = L.w + 'px';
          el.style.height = L.h + 'px';
          el.style.zIndex = 60 + i;
        });

        if (proj) {
          creditEl.textContent = `${proj.credit} — ${proj.client}`;
          creditEl.classList.add('visible');
        }
      });

      nameEl.addEventListener('mouseleave', () => {
        if (isMobile()) return;
        resetMoodboard();
      });

      nameEl.addEventListener('click', () => {
        if (!isMobile()) return;
        const isActive = nameEl.classList.contains('active');

        document.querySelectorAll('.proj-name').forEach(n => n.classList.remove('active'));
        domItems.forEach(el => {
          el.classList.remove('highlighted-mobile', 'faded-mobile');
          el.style.order = '';
        });
        creditEl.classList.remove('visible');

        if (!isActive) {
          nameEl.classList.add('active');
          domItems.forEach(el => {
            if (el.dataset.project === pid) {
              el.classList.add('highlighted-mobile');
              el.style.order = '-1';
            } else {
              el.classList.add('faded-mobile');
              el.style.order = '99';
            }
          });
          if (proj) {
            creditEl.textContent = `${proj.credit} — ${proj.client}`;
            creditEl.classList.add('visible');
          }
          document.getElementById('modal-work').scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
    });

    document.getElementById('open-work').onclick = () => {
      document.getElementById('modal-work').style.display = 'block';
      if (!isMobile()) setTimeout(layoutDesktop, 60);
    };

    document.getElementById('close-work').onclick = () => {
      document.getElementById('modal-work').style.display = 'none';
      resetMoodboard();
      document.querySelectorAll('.proj-name').forEach(n => n.classList.remove('active'));
    };

    window.addEventListener('resize', () => {
      if (!isMobile() && document.getElementById('modal-work').style.display === 'block') {
        origPos.length = 0;
        layoutDesktop();
      }
    });
  </script>
</body>
</html>
